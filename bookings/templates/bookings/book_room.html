{% extends 'base.html' %}
{% block content %}
<div class="form-wrapper">
    <h2>Book Your Room</h2> 
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="text-center">
            <button type="submit" class="btn btn-success">Confirm Booking</button>
            <a href="{% url 'profile' %}" class="btn btn-danger">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
